name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,eval]"
      - name: Ruff
        run: ruff check apps/api-server/src apps/api-server/tests
      - name: Flake8
        run: flake8 apps/api-server/src apps/api-server/tests
      - name: Mypy
        run: mypy apps/api-server/src/core/config.py apps/api-server/src/core/llm_client.py
      - name: Pytest
        run: pytest -m unit --cov=apps/api-server/src --cov-fail-under=50
      - name: Evaluation
        run: python -c "import asyncio; from evaluation.runner import run_evaluation; print(asyncio.run(run_evaluation())['count'])"
        env:
          PYTHONPATH: apps/api-server/src

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm install
      - name: Build frontend
        run: npm run build
