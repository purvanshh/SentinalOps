name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Build API image
        run: docker build -f apps/api-server/Dockerfile .
      - name: Build web image
        run: docker build -f apps/web-dashboard/Dockerfile .
