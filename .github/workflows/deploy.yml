name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f apps/api-server/Dockerfile .
      - name: Build web image
        run: docker build -f apps/web-dashboard/Dockerfile .
