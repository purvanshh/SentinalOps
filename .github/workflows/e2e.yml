name: Nightly E2E Tests

on:
  schedule:
    - cron: '0 2 * * *' # Every night at 2:00 AM UTC
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,eval]"
      - name: Start E2E services
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build --wait
      - name: Seed database
        run: |
          DATABASE_URL="postgresql+psycopg://sentinelops_e2e:sentinelops_e2e_pass@localhost:5433/sentinelops_e2e" python scripts/seed_e2e.py
      - name: Run E2E Tests
        run: |
          E2E_API_URL="http://localhost:8080" pytest -m e2e
      - name: Shutdown E2E services
        if: always()
        run: |
          docker compose -f docker-compose.e2e.yml down -v
