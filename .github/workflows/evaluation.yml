name: Evaluation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  evaluation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,eval]"
      - name: Run evaluation summary
        run: |
          PYTHONPATH=apps/api-server/src python -c "import asyncio, json; from evaluation.runner import run_evaluation; print(json.dumps(asyncio.run(run_evaluation()), indent=2))"
