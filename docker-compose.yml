services:
  migrations:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    env_file:
      - .env
    command: ["python", "-c", "import asyncio; from db.session import initialize_database; asyncio.run(initialize_database())"]
    depends_on:
      postgres:
        condition: service_healthy

  api-server:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      prometheus:
        condition: service_healthy
      grafana:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
  celery-worker:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "workers.queues.celery_app", "worker", "--loglevel=info", "-Q", "incidents,approvals"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
  celery-beat:
    build:
      context: .
      dockerfile: apps/api-server/Dockerfile
    env_file:
      - .env
    command: ["celery", "-A", "workers.queues.celery_app", "beat", "--loglevel=info"]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      celery-worker:
        condition: service_started
  web-dashboard:
    build:
      context: .
      dockerfile: apps/web-dashboard/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api-server:8000}
      NEXT_PUBLIC_DEMO_BEARER_TOKEN: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJkYXNoYm9hcmQtZGVtbyIsInJvbGVzIjpbImFkbWluIiwib3BlcmF0b3IiLCJ2aWV3ZXIiXSwiYXVkIjoic2VudGluZWxvcHMtYXBpIiwiaXNzIjoiaHR0cHM6Ly9zZW50aW5lbG9wcy5sb2NhbC8ifQ.MQMJ_6dVZcJzwlY6RaH2VvaNDrK4dySkt9MlrQ9iXtI
    ports:
      - "3001:3000"
    depends_on:
      api-server:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinelops}
      POSTGRES_USER: ${POSTGRES_USER:-sentinelops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelops-dev}
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinelops} -d ${POSTGRES_DB:-sentinelops}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infrastructure/docker/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:2.9.8
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infrastructure/docker/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.6.1
    ports:
      - "3200:3200"
      - "4318:4318"
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infrastructure/docker/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
