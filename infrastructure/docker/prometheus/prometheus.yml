global:
  scrape_interval: 15s

scrape_configs:
  - job_name: sentinelops-api
    static_configs:
      - targets: ["api-server:8000"]
  - job_name: sentinelops-simulation
    static_configs:
      - targets:
          [
            "payment-service:9101",
            "auth-service:9102",
            "notification-service:9103",
            "gateway-service:9104",
          ]
